services:
  init-permissions:
    image: busybox
    command: sh -c "chown -R 1000:1000 /data /linuxbrew"
    volumes:
      - ./data:/data
      - ./data/linuxbrew:/linuxbrew
    restart: "no"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    init: true
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${PORT:-18789}:${PORT:-18789}"
    volumes:
      - ./data:/home/node/.openclaw
      - ./data/linuxbrew:/home/linuxbrew
    env_file:
      - .env
